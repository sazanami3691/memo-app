<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ローカルWebメモ Phase 3</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/search.css">
  <link rel="stylesheet" href="css/blocks.css">
  <link rel="stylesheet" href="css/mz-message.css">
  <link rel="stylesheet" href="css/image-tools.css">
  <link rel="stylesheet" href="css/modals.css">
  <link rel="stylesheet" href="css/drawing.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/themes.css">
</head>
<body>
  <div class="app-shell">
    <div class="app-controls" aria-label="画面操作">
      <header class="screen-header">
        <div class="screen-header-left">
          <button id="screenBackButton" class="nav-back-button hidden" type="button">戻る</button>
        </div>
        <div id="screenHeaderTitle" class="screen-header-title">フォルダ</div>
        <div class="screen-header-right">
          <button id="addPanelToggle" class="add-menu-icon-button" type="button" aria-label="追加メニュー">＋</button>
          <button id="controlPanelToggle" class="control-menu-icon-button" type="button" aria-label="操作メニュー">⚙</button>
        </div>
      </header>

      <div id="addPanel" class="add-panel collapsed">
        <section class="control-group">
          <h3>本文に追加</h3>
          <div class="button-stack">
            <button id="addTextBlockButton" class="primary-button" type="button">テキストブロック追加</button>
            <button id="addMzMessageBlockButton" class="primary-button" type="button">MZ文章追加</button>
            <button id="addImageBlockButton" class="primary-button" type="button">画像ブロック追加</button>
            <button id="addReusableImageBlockButton" class="primary-button" type="button">登録画像から追加</button>
            <button id="addDrawingBlockButton" class="primary-button" type="button">手書きブロック追加</button>
            <button id="scrollToLastBlockButton" type="button">↓ 一番下へ</button>
          </div>
        </section>
      </div>

      <div id="controlPanel" class="control-panel collapsed">
        <section class="control-group">
          <h3>ツール</h3>
          <div class="button-stack">
            <button id="openSearchButton" type="button">検索</button>
          </div>
        </section>

        <section class="control-group">
          <h3>フォルダ操作</h3>
          <div class="button-stack">
            <button id="addParentFolderButton" class="primary-button" type="button">親フォルダ作成</button>
            <button id="addChildFolderButton" type="button">子フォルダ作成</button>
            <button id="renameFolderButton" type="button">名前変更</button>
            <button id="deleteFolderButton" class="danger-button" type="button">削除</button>
          </div>
        </section>

        <section class="control-group">
          <h3>メモ操作</h3>
          <div class="button-stack">
            <button id="addNoteButton" class="primary-button" type="button">新規メモ</button>
            <button id="deleteSelectedNoteButton" class="danger-button" type="button">選択中メモを削除</button>
          </div>
        </section>

        <section class="control-group">
          <h3>バックアップ</h3>
          <div class="button-stack">
            <button id="exportBackupButton" type="button">バックアップ書き出し</button>
            <button id="importBackupButton" type="button">バックアップ読み込み</button>
          </div>
        </section>

        <section class="control-group">
          <h3>オプション</h3>
          <div class="button-stack">
            <button id="registerReusableImageButton" type="button">よく使う画像を登録</button>
            <button id="updateAppButton" type="button">アプリを更新</button>
            <button id="themeToggleButton" type="button">ダークテーマに切替</button>
            <button id="mzTextPreviewToggleButton" type="button" aria-pressed="false">通常ブロックをMZ表示（全メモ）: OFF</button>
          </div>
        </section>
      </div>
    </div>

    <aside class="column folder-column screen-panel" aria-label="フォルダ一覧">
      <nav id="folderList" class="folder-list" aria-live="polite"></nav>
    </aside>

    <main class="column note-list-column screen-panel hidden-screen" aria-label="メモ一覧">
      <header class="content-header">
        <div>
          <p class="eyebrow">Notes</p>
          <h2 id="selectedFolderName">未選択</h2>
        </div>
      </header>

      <div id="noteList" class="note-list" aria-live="polite"></div>
    </main>

    <section class="column search-column screen-panel hidden-screen" aria-label="検索">
      <div class="search-field-wrap">
        <label class="field-label" for="searchInput">メモ・フォルダを検索</label>
        <input id="searchInput" class="search-input" type="search" autocomplete="off" placeholder="タイトル、本文、キャプション、フォルダ名">
      </div>
      <div id="searchResults" class="search-results" aria-live="polite"></div>
    </section>

    <section class="column editor-column screen-panel hidden-screen" aria-label="メモ編集">
      <header class="editor-header content-header">
        <div>
          <p class="eyebrow">Editor</p>
          <h2>編集</h2>
        </div>
        <span id="saveStatus" class="save-status">保存済み</span>
      </header>

      <div id="emptyEditorMessage" class="empty-editor">
        フォルダを選んでメモを作成、またはメモを選択してください。
      </div>

      <div id="editorModeSwitch" class="editor-mode-switch hidden">
        <button id="previewModeButton" class="mode-button" type="button">閲覧</button>
        <button id="editModeButton" class="mode-button" type="button">編集</button>
      </div>

      <div id="noteActions" class="note-actions hidden">
        <button id="togglePinButton" type="button">☆ お気に入り</button>
        <button id="moveNoteButton" type="button">メモを移動</button>
      </div>

      <div id="previewArea" class="preview-area hidden"></div>

      <form id="editorForm" class="editor-form hidden">
        <label class="field-label" for="noteTitleInput">タイトル</label>
        <input id="noteTitleInput" class="title-input" type="text" autocomplete="off" placeholder="メモタイトル">

        <div id="blockList" class="block-list" aria-live="polite"></div>
      </form>
    </section>
  </div>

  <input id="imageFileInput" class="hidden" type="file" accept="image/*">
  <input id="reusableImageFileInput" class="hidden" type="file" accept="image/*">
  <input id="backupFileInput" class="hidden" type="file" accept="application/json,.json">

  <div id="imageCropModal" class="image-crop-modal hidden" aria-hidden="true">
    <div class="image-crop-modal-content" role="dialog" aria-modal="true" aria-label="画像トリミング">
      <header class="image-crop-modal-header">
        <h2>画像トリミング</h2>
        <button id="imageCropCloseButton" type="button">閉じる</button>
      </header>

      <p class="image-crop-help">枠をドラッグで移動、右下のハンドルでサイズ変更できます。</p>

      <div class="image-crop-canvas-wrap">
        <canvas id="imageCropCanvas" width="1000" height="650"></canvas>
      </div>

      <footer class="image-crop-modal-footer">
        <button id="imageCropResetButton" type="button">中央にリセット</button>
        <button id="imageCropUseWholeButton" type="button">画像全体を使う</button>
        <button id="imageCropApplyButton" class="primary-button" type="button">トリミングして追加</button>
        <button id="imageCropCancelButton" type="button">キャンセル</button>
      </footer>
    </div>
  </div>

  <div id="imageModal" class="image-modal hidden" aria-hidden="true">
    <div class="image-modal-content" role="dialog" aria-modal="true" aria-label="画像プレビュー">
      <button id="imageModalClose" class="image-modal-close" type="button">閉じる</button>
      <img id="imageModalImage" alt="拡大画像">
    </div>
  </div>

  <div id="drawingModal" class="drawing-modal hidden" aria-hidden="true">
    <div class="drawing-modal-content" role="dialog" aria-modal="true" aria-label="手書きメモ">
      <header class="drawing-modal-header">
        <h2>手書きメモ</h2>
        <button id="drawingModalCloseButton" type="button">閉じる</button>
      </header>

      <div class="drawing-toolbar" aria-label="手書きツール">
        <button id="drawingPenButton" class="active-tool" type="button">ペン</button>
        <button id="drawingEraserButton" type="button">消しゴム</button>
        <button id="drawingSizeSmallButton" type="button">細</button>
        <button id="drawingSizeMediumButton" class="active-tool" type="button">中</button>
        <button id="drawingSizeLargeButton" type="button">太</button>
        <button id="drawingUndoButton" type="button">Undo</button>
        <button id="drawingRedoButton" type="button">Redo</button>
        <button id="drawingClearButton" class="danger-button" type="button">全消し</button>
      </div>

      <div class="drawing-canvas-wrap">
        <canvas id="drawingCanvas" width="1200" height="800"></canvas>
      </div>

      <footer class="drawing-modal-footer">
        <button id="drawingSaveButton" class="primary-button" type="button">保存</button>
        <button id="drawingCancelButton" type="button">キャンセル</button>
      </footer>
    </div>
  </div>

  <div id="moveNoteModal" class="move-note-modal hidden" aria-hidden="true">
    <div class="move-note-modal-content" role="dialog" aria-modal="true" aria-labelledby="moveNoteModalTitle">
      <header class="move-note-modal-header">
        <h2 id="moveNoteModalTitle">移動先を選択</h2>
        <button id="moveNoteModalCloseButton" type="button">閉じる</button>
      </header>
      <div id="moveNoteFolderList" class="move-note-folder-list"></div>
      <footer class="move-note-modal-footer">
        <button id="moveNoteCancelButton" type="button">キャンセル</button>
      </footer>
    </div>
  </div>

  <div id="reusableImageModal" class="reusable-image-modal hidden" aria-hidden="true">
    <div class="reusable-image-modal-content" role="dialog" aria-modal="true" aria-labelledby="reusableImageModalTitle">
      <header class="reusable-image-modal-header">
        <h2 id="reusableImageModalTitle">登録画像</h2>
        <button id="reusableImageModalCloseButton" type="button">閉じる</button>
      </header>
      <div id="reusableImageList" class="reusable-image-list"></div>
      <footer class="reusable-image-modal-footer">
        <button id="reusableImageModalCancelButton" type="button">閉じる</button>
      </footer>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
